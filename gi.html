<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIGA - Intro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --bg-color: #030712;
            --primary: #00f0ff;
            --danger: #ff003c;
            --glass-bg: rgba(16, 22, 35, 0.6);
            --glass-border: rgba(0, 240, 255, 0.2);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Share Tech Mono', monospace;
            color: white;
            overflow: hidden;
        }

        /* Latar Belakang Jaringan Animasi */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.8;
        }

        /* Kontainer Utama */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, transparent 0%, #030712 90%);
        }

        /* Efek Glitch Judul */
        .glitch-wrapper {
            position: relative;
        }

        .glitch {
            font-size: 8rem;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
            margin: 0;
            letter-spacing: 15px;
            color: #ffffff;
        }

        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
        }

        .glitch::before {
            left: 3px;
            text-shadow: -2px 0 var(--danger);
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -3px;
            text-shadow: -2px 0 var(--primary);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); }
            20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); }
            60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); }
            100% { clip-path: inset(30% 0 20% 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); }
            20% { clip-path: inset(30% 0 20% 0); }
            40% { clip-path: inset(70% 0 10% 0); }
            60% { clip-path: inset(20% 0 50% 0); }
            80% { clip-path: inset(50% 0 30% 0); }
            100% { clip-path: inset(5% 0 80% 0); }
        }

        /* Subjudul Mesin Ketik */
        .subtitle {
            font-size: 1.5rem;
            color: var(--primary);
            margin-top: -10px;
            margin-bottom: 40px;
            letter-spacing: 5px;
            border-right: 2px solid var(--primary);
            white-space: nowrap;
            overflow: hidden;
            animation: blinkCursor 0.75s step-end infinite;
        }

        @keyframes blinkCursor {
            from, to { border-color: transparent }
            50% { border-color: var(--primary); }
        }

        /* Grid Fitur (Glassmorphism) */
        .features {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1000px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1.5s 2s forwards ease-out;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(0, 240, 255, 0.2), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .card:hover::before {
            left: 150%;
        }

        .card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
            transform: translateY(-5px);
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: #fff;
            letter-spacing: 2px;
        }

        .card p {
            margin: 0;
            font-size: 0.8rem;
            color: #a0aec0;
        }

        .danger-text {
            color: var(--danger) !important;
            text-shadow: 0 0 5px var(--danger);
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <canvas id="networkCanvas"></canvas>

    <div class="container">
        <div class="glitch-wrapper">
            <h1 class="glitch" data-text="GIGA">GIGA</h1>
        </div>
        <div class="subtitle" id="typing-text"></div>

        <div class="features">
            <div class="card">
                <h3>[ WORM ]</h3>
                <p>Otonomisasi Penyebaran</p>
            </div>
            <div class="card">
                <h3>[ EDR ]</h3>
                <p>Eksfiltrasi & By-Pass</p>
            </div>
            <div class="card">
                <h3 class="danger-text">[ KEYLOG ]</h3>
                <p>Pencatatan Papan Klip</p>
            </div>
            <div class="card">
                <h3>[ STEAL ]</h3>
                <p>Enkripsi Data Mentah</p>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Animasi Typing Subjudul ---
        const text = "ADVANCED RED TEAM FRAMEWORK // OTONOM & TERDESENTRALISASI";
        const typingElement = document.getElementById("typing-text");
        let i = 0;

        function typeWriter() {
            if (i < text.length) {
                typingElement.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 50); // Kecepatan ketik
            }
        }
        
        // Mulai ketik setelah 500ms
        setTimeout(typeWriter, 500);


        // --- 2. Animasi Latar Belakang Jaringan Node ---
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');
        let particlesArray;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = '#00f0ff';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00f0ff';
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 15000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 2) - 1;
                let directionY = (Math.random() * 2) - 1;
                let color = '#00f0ff';
                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        // Menghubungkan titik-titik yang berdekatan dengan garis
        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) + 
                                   ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    if (distance < (canvas.width / 10) * (canvas.height / 10)) {
                        opacityValue = 1 - (distance / 20000);
                        ctx.strokeStyle = 'rgba(0, 240, 255,' + opacityValue + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        window.addEventListener('resize', () => {
            canvas.width = innerWidth;
            canvas.height = innerHeight;
            init();
        });

        init();
        animate();
    </script>
</body>
</html>
