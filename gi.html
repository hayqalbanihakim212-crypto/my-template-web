<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIGA Cyber Animation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050a15;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* Latar Belakang Garis (Grid) */
        .grid-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            perspective: 600px;
            overflow: hidden;
            z-index: 1;
        }

        .grid {
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 150, 255, 0.4) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0, 150, 255, 0.4) 2px, transparent 2px);
            background-size: 50px 50px;
            transform: rotateX(75deg);
            animation: gridMove 2s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: rotateX(75deg) translateY(0); }
            100% { transform: rotateX(75deg) translateY(50px); }
        }

        /* Lingkaran Merah di Tengah */
        .red-circle {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(75deg);
            width: 300px;
            height: 300px;
            border: 4px solid red;
            border-radius: 50%;
            box-shadow: 0 0 20px red, inset 0 0 20px red;
            z-index: 2;
            animation: pulse 2s infinite alternate;
        }

        .red-circle-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            border: 2px solid rgba(255, 0, 0, 0.5);
            border-radius: 50%;
            box-shadow: 0 0 10px red;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px red, inset 0 0 20px red; opacity: 0.7; }
            100% { box-shadow: 0 0 50px red, inset 0 0 50px red; opacity: 1; }
        }

        /* Teks Utama GIGA */
        .title-container {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .giga-text {
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to bottom, #ffffff 0%, #888888 50%, #444444 100%);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0px 5px 15px rgba(0, 150, 255, 0.5);
            letter-spacing: 10px;
            animation: float 4s ease-in-out infinite;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            margin-top: -10px;
            letter-spacing: 5px;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* Efek Partikel/Data Teks */
        .floating-text {
            position: absolute;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            text-shadow: 0 0 5px white;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.5s;
        }

    </style>
</head>
<body>

    <div class="grid-container">
        <div class="grid"></div>
        <div class="red-circle">
            <div class="red-circle-inner"></div>
        </div>
    </div>

    <div class="title-container">
        <h1 class="giga-text">GIGA</h1>
        <div class="subtitle">OTONOM & TERDESENTRALISASI</div>
    </div>

    <script>
        // JavaScript untuk memunculkan teks hacker secara acak
        const terms = [
            "EDR", "PERSISTENSI", "WORM", "EKSFILTRASI", 
            "MENCURI", "PAPAN KLIP", "KEKUATAN DI TANGAN"
        ];

        function createFloatingText() {
            const el = document.createElement('div');
            el.classList.add('floating-text');
            el.innerText = terms[Math.floor(Math.random() * terms.length)];
            
            // Posisi acak
            el.style.left = Math.random() * 80 + 10 + '%';
            el.style.top = Math.random() * 80 + 10 + '%';
            
            document.body.appendChild(el);

            // Animasi Fade in & Out
            setTimeout(() => { el.style.opacity = '1'; }, 100);
            
            setTimeout(() => {
                el.style.opacity = '0';
                setTimeout(() => { el.remove(); }, 500);
            }, 2000 + Math.random() * 2000); // Tampil selama 2-4 detik
        }

        // Jalankan teks melayang setiap 800ms
        setInterval(createFloatingText, 800);
    </script>

</body>
</html>
